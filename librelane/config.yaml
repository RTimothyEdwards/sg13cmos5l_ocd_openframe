meta:
  version: 2
  flow: Classic
  substituting_steps:
    
    # Allow assignments for por, porb
    Checker.NetlistAssignStatements: null
    
    # For debugging
    +OpenROAD.GeneratePDN: Magic.StreamOut
    
    # Ignore disconnected pins
    Checker.DisconnectedPins: null
    
    # TODO reenable again?
    OpenROAD.IRDropReport: null
    
    # Not needed
    Magic.WriteLef: null
    Odb.CheckDesignAntennaProperties: null
    
    # KLayout doesn't streamout (?)
    KLayout.StreamOut: null
    KLayout.XOR: null
    
    # Magic has no issues with DRC
    # Magic.DRC: null
    
    # We run KLayout DRC manually
    KLayout.DRC: null
    
    # We run LVS manually
    Netgen.LVS: null
    
    # Some macros may overlap on purpose
    Checker.IllegalOverlap: null

DESIGN_NAME: housekeeping_top
VERILOG_FILES:
- dir::../verilog/rtl/synth_defs.v
- dir::../verilog/rtl/housekeeping_spi.v
- dir::../verilog/rtl/housekeeping.v
- dir::../verilog/rtl/housekeeping_top.v

DEDUPLICATE_CORNERS: true

# Use the IHP CMOS5L standard cell library
STD_CELL_LIBRARY: sg13cmos5l_stdcell

# Technology libs
LIB:
  "nom_typ_1p20V_25C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_typ_1p20V_25C.lib

  "nom_typ_1p50V_25C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_typ_1p50V_25C.lib

  "nom_slow_1p35V_125C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_slow_1p35V_125C.lib

  "nom_slow_1p08V_125C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_slow_1p08V_125C.lib

  "nom_fast_1p32V_m40C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_fast_1p32V_m40C.lib

  "nom_fast_1p65V_m40C":
    - pdk_dir::libs.ref/sg13cmos5l_stdcell/lib/sg13cmos5l_stdcell_fast_1p65V_m40C.lib


# Corners
STA_CORNERS:
  - nom_typ_1p20V_25C
  - nom_typ_1p50V_25C
  - nom_slow_1p35V_125C
  - nom_slow_1p08V_125C
  - nom_fast_1p32V_m40C
  - nom_fast_1p65V_m40C

CTS_CLK_BUFFERS:
  - "sg13cmos5l_buf_8"
  - "sg13cmos5l_buf_4"
  - "sg13cmos5l_buf_2"

DEFAULT_CORNER: nom_typ_1p20V_25C

# Magic streamout: don't blackbox macros
MAGIC_MACRO_STD_CELL_SOURCE: PDK

# Don't short top-level pins
MAGIC_EXT_SHORT_RESISTOR: true

# IGNORE_DISCONNECTED_MODULES:
#     - manual_routing

# Prevent porb_h mangling
SYNTH_DIRECT_WIRE_BUFFERING: False
SYNTH_WRITE_NOATTR: False

# Ignores don't touch directive
PL_TIME_DRIVEN: False

# Clock
CLOCK_NET: SCK
CLOCK_PORT: SCK
CLOCK_PERIOD: 15

# SDC
FALLBACK_SDC_FILE: dir::base.sdc

# CTS
CTS_OBSTRUCTION_AWARE: true
CTS_CLK_MAX_WIRE_LENGTH: 1200
CTS_SINK_CLUSTERING_SIZE: 25 # default 25
CTS_SINK_CLUSTERING_MAX_DIAMETER: 60 # default 50

# Routing
GRT_ALLOW_CONGESTION: true
RT_CLOCK_MAX_LAYER: Metal4
#RT_MAX_LAYER: Metal4
#DRT_MAX_LAYER: Metal4

# Resizer
# RSZ_DONT_TOUCH_RX: porb_l|por_l
DESIGN_REPAIR_BUFFER_INPUT_PORTS: false
DESIGN_REPAIR_BUFFER_OUTPUT_PORTS: false

# Overfix hold violations
PL_RESIZER_HOLD_SLACK_MARGIN: 0.2

VDD_NETS:
- vccd

GND_NETS:
- vssd

PDN_CORE_RING: false

# FP_PDN_CFG: dir::pdn_cfg.tcl

# FP_PDN_VWIDTH: 2.0
# FP_PDN_HWIDTH: 5.0
# FP_PDN_VSPACING: 1.7
# FP_PDN_HSPACING: 1.7
# FP_PDN_VPITCH: 55
# FP_PDN_HPITCH: 70

# FP_PDN_CORE_RING: true
# FP_PDN_CORE_RING_VWIDTH: 8
# FP_PDN_CORE_RING_HWIDTH: 8

# FP_PDN_CORE_RING_VOFFSET: 2
# FP_PDN_CORE_RING_HOFFSET: 2

# Floorplanning
FP_SIZING: absolute

DIE_AREA: [ 360.00,  300.00, 1700.00, 480.00 ]
CORE_AREA: [ 360.00,  300.00, 1700.00, 480.00 ]

FP_DEF_TEMPLATE: dir::../def/housekeeping_top.def
FP_TEMPLATE_MATCH_MODE: permissive
#FP_TEMPLATE_COPY_POWER_PINS: True

PL_TARGET_DENSITY_PCT: 20 # TODO

